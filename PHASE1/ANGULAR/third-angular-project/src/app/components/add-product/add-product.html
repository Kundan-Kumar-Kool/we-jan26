<div style="border:solid 1px rgb(68, 224, 37)">
    <br/>

<h2>Create a new Product</h2>

<form [formGroup]="productForm" (submit)="onSubmit()">

    <div>
        <label>Product Name</label>
        <input type="text" formControlName="name">

        <div *ngIf="f['name'].touched && f['name'].invalid">
            <small *ngIf="f['name'].errors?.['required']">Name is required</small>
            <small *ngIf="f['name'].errors?.['minlength']">Minimum 3 characters</small>
        </div>

    </div>

    <div>
        <label>Product Price</label>
        <input type="text" formControlName="price">

        <div *ngIf="f['price'].touched && f['price'].invalid">
            <small *ngIf="f['price'].errors?.['required']">Price is required</small>
            <small *ngIf="f['price'].errors?.['min']">Minimum price is 100</small>
        </div>

    </div>

    <div>
        <label>Description</label>
        <textarea rows="4" formControlName="description" placeholder="Enter product description">
</textarea>
        <div *ngIf="f['description'].touched && f['description'].invalid">
            <small *ngIf="f['description'].errors?.['minlength']">
                Minimum 10 characters required
            </small>
            <small *ngIf="f['description'].errors?.['maxlength']">
                Maximum 20 characters allowed
            </small>
        </div>
    </div>


    <button type="submit">
        Add Product
    </button>

    <button type="button" (click)="productForm.reset()">
        Reset
    </button>

</form>

<br/>
</div>
